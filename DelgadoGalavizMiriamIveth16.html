<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Miriam Delgado 16</title>

<style>

body{
font-family: Arial, Helvetica, sans-serif;
background-color:#f2f2f2;
margin:0;
padding:0;
}

.container{
width:700px;
margin:auto;
background:white;
padding:25px;
margin-top:30px;
border-radius:10px;
box-shadow:0px 0px 10px gray;
}

center h1{
color:#003366;
margin-bottom:5px;
}

center h2{
color:#555;
margin-top:0;
}

fieldset{
border:2px solid #003366;
border-radius:8px;
margin-bottom:20px;
padding:15px;
}

legend{
font-weight:bold;
color:#003366;
padding:5px 10px;
}

label{
font-weight:bold;
}

input[type=text],
input[type=date],
input[type=time],
select{
width:100%;
padding:8px;
margin-top:5px;
margin-bottom:10px;
border-radius:5px;
border:1px solid #ccc;
}

input[type=radio]{
margin-left:10px;
}

input[type=submit],
input[type=reset]{
padding:10px 20px;
border:none;
border-radius:5px;
cursor:pointer;
font-weight:bold;
}

input[type=submit]{
background-color:#003366;
color:white;
}

input[type=reset]{
background-color:#999;
color:white;
}

input[type=submit]:hover{
background-color:#0055aa;
}

input[type=reset]:hover{
background-color:#777;
}

</style>

</head>

<body>

<div class="container">

<center>
<img src="https://aula.uas.edu.mx/assets/img/logo_uas2.png" width="120">
<h1>Universidad Autonoma de Sinaloa</h1>
<h2>Bitacora de Prestamo de Equipos</h2>
</center>

<form>

<fieldset>
<legend>Datos del solicitante</legend>

<label>Nombre completo:</label><br>
<input type="text" name="nombre"><br>

<label>Carrera:</label><br>
<input type="text" name="carrera"><br>

<label>Grupo:</label><br>
<input type="text" name="grupo"><br>

<label>Tipo de usuario:</label><br>
<input type="radio" name="tipo" value="alumno"> Alumno
<input type="radio" name="tipo" value="profesor"> Profesor

</fieldset>

<fieldset>
<legend>Datos del equipo o libro</legend>

<label>Nombre del equipo o libro:</label><br>
<input type="text" name="equipo"><br>

<label>Condiciones:</label><br>
<select name="condicion">
<option value="">Seleccionar</option>
<option value="bueno">Bueno</option>
<option value="regular">Regular</option>
<option value="malo">Malo</option>
</select>

</fieldset>

<fieldset>
<legend>Datos del prestamo</legend>

<label>Fecha de prestamo:</label><br>
<input type="date" name="fecha_prestamo"><br>

<label>Hora de prestamo:</label><br>
<input type="time" name="hora_prestamo"><br>

<label>Fecha de entrega:</label><br>
<input type="date" name="fecha_entrega"><br>

<label>Hora de entrega:</label><br>
<input type="time" name="hora_entrega"><br>

</fieldset>

<fieldset>
<legend>Firmas</legend>

<label>Firma del solicitante:</label><br>
<input type="text" name="firma_solicitante"><br>

<label>Firma del responsable:</label><br>
<input type="text" name="firma_responsable"><br>

</fieldset>

<input type="submit" value="Registrar prestamo">
<input type="reset" value="Limpiar formulario">

</form>

</div>

</body>
</html>
