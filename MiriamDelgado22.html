<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Practica formula general</title>
</head>
<body>

<h1>Practica formula general Miriam Delgado</h1>

<input type="text" id="a" placeholder="a">
<input type="text" id="b" placeholder="b">
<input type="text" id="c" placeholder="c">

<button onclick="calcular()">Calcular</button>

<p id="resultado"></p>

<script>
function calcular(){
var a = Number(document.getElementById("a").value);
var b = Number(document.getElementById("b").value);
var c = Number(document.getElementById("c").value);

var x1 = (-b + Math.sqrt(b*b - 4*a*c)) / (2*a);
var x2 = (-b - Math.sqrt(b*b - 4*a*c)) / (2*a);

document.getElementById("resultado").innerHTML = "x1: " + x1 + "<br>x2: " + x2;
}
</script>

</body>
</html>
