<!DOCTYPE html>
<html>
<head>
    <title>Salidas en JavaScript</title>
</head>
<body>

<h2>Ejemplos de salidas en JavaScript</h2>

<p id="demo"></p>

<script>
let nombre = "Miriam Iveth Delgado Galaviz";
let edad = 21;
let carrera = "Ingenieria en Software";

document.getElementById("demo").innerHTML = "Nombre: " + nombre + "<br>Edad: " + edad + "<br>Carrera: " + carrera;

document.write("<br>Nombre: " + nombre + "<br>Edad: " + edad + "<br>Carrera: " + carrera);

alert("Nombre: " + nombre + " Edad: " + edad + " Carrera: " + carrera);

console.log("Nombre: " + nombre + " Edad: " + edad + " Carrera: " + carrera);
</script>

</body>
</html>
